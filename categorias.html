<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Categorias | MF Finanças</title>

    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="dashboard">

    <aside class="sidebar">

        <div class="sidebar-logo">
            <h1>MF <span>Finanças</span></h1>
        </div>

        <div class="sidebar-user">

            <div
                id="userName"
                class="sidebar-user-name">

                Usuário

            </div>

            <div class="sidebar-user-role">
                Administrador
            </div>

        </div>

        <nav class="sidebar-menu">

            <div class="menu-title">
                Principal
            </div>

            <a href="dashboard.html" class="menu-link">
                Dashboard
            </a>

            <div class="menu-title">
                Financeiro
            </div>

            <a href="lancamentos.html" class="menu-link">
                Lançamentos
            </a>

            <a href="contas.html" class="menu-link">
                Contas Financeiras
            </a>

            <a href="categorias.html" class="menu-link active">
                Categorias
            </a>

        </nav>

        <div class="sidebar-footer">

            <button
                class="btn btn-secondary btn-full"
                onclick="logout()">

                Sair

            </button>

        </div>

    </aside>

    <main class="main-content">

        <header class="topbar">

            <div class="topbar-title">

                <h2>
                    Categorias
                </h2>

                <span>
                    Organize receitas e despesas
                </span>

            </div>

        </header>

        <div class="content">

            <div class="kpi-grid">

                <div class="kpi-card">

                    <div class="kpi-label">
                        Total de Categorias
                    </div>

                    <div
                        id="kpiTotal"
                        class="kpi-value">

                        0

                    </div>

                </div>

                <div class="kpi-card">

                    <div class="kpi-label">
                        Receitas
                    </div>

                    <div
                        id="kpiReceitas"
                        class="kpi-value">

                        0

                    </div>

                </div>

                <div class="kpi-card">

                    <div class="kpi-label">
                        Despesas
                    </div>

                    <div
                        id="kpiDespesas"
                        class="kpi-value">

                        0

                    </div>

                </div>

            </div>

            <div class="crud-layout">

                <div class="widget">

                    <div class="widget-title">
                        Categorias Cadastradas
                    </div>

                    <div class="table-wrapper">

                        <table class="table">

                            <thead>

                                <tr>

                                    <th>Categoria</th>
                                    <th>Tipo</th>
                                    <th>Ações</th>

                                </tr>

                            </thead>

                            <tbody id="listaCategorias">

                            </tbody>

                        </table>

                    </div>

                </div>

                <div class="widget">

                    <div class="widget-title">

                        Nova Categoria

                    </div>

                    <div class="form-group">

                        <label class="label">
                            Nome
                        </label>

                        <input
                            id="nome"
                            type="text"
                            class="input">

                    </div>

                    <div class="form-group">

                        <label class="label">
                            Tipo
                        </label>

                        <select
                            id="tipo"
                            class="select">

                            <option value="receita">
                                Receita
                            </option>

                            <option value="despesa">
                                Despesa
                            </option>

                        </select>

                    </div>

                    <button
                        onclick="salvarCategoria()"
                        class="btn btn-primary btn-full">

                        Salvar Categoria

                    </button>

                </div>

            </div>

        </div>

    </main>

    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/categorias.js"></script>

</body>

</html>
