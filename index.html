<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</head>
<body class="bg-[#0c0c0e] text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#16161a] border border-zinc-800 rounded-2xl p-6 shadow-xl space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-[#d4af37]">Sistema Corp</h1>
            <p class="text-xs text-gray-400 mt-1">Autenticação Segura via Banco de Dados</p>
        </div>

        <form id="form-login" class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 block mb-1">E-mail de Acesso</label>
                <input type="email" id="login-email" placeholder="seu@email.com" class="w-full bg-[#0c0c0e] border border-zinc-700 rounded p-2.5 text-sm focus:border-[#d4af37] outline-none transition-colors" required />
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-1">Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-[#0c0c0e] border border-zinc-700 rounded p-2.5 text-sm focus:border-[#d4af37] outline-none transition-colors" required />
            </div>

            <button type="submit" class="w-full bg-[#d4af37] text-black hover:bg-[#b8860b] py-2.5 rounded-lg font-bold text-sm transition-colors mt-2 shadow-lg shadow-[#d4af37]/10">
                Entrar no Sistema
            </button>
        </form>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE (Substitua com as suas credenciais oficiais)
        const SUPABASE_URL = "https://hrdtylxfkcsgyhghhptr.supabase.co".replace(/\/$/, "");
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyZHR5bHhma2NzZ3loZ2hocHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODc3NzksImV4cCI6MjA5NTU2Mzc3OX0.DwnwVrOcYfTeiz18BJEvCipoeDUQ4t_dg3biuCtIe94";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // CONTROLE DE LOGIN COM TEMPORIZADOR
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // 1. Liga o popup de carregamento imediatamente
        showLoader();

        // 2. Pausa artificial de 1.5 segundos ("Pensa um pouquinho")
        await new Promise(resolve => setTimeout(resolve, 1500));

        const email = document.getElementById('input-email').value.trim();
        const senha = document.getElementById('input-password').value.trim();

        try {
            // 3. Validação real no Supabase
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: senha
            });

            if (error) throw error;

            // Sucesso: Salva a sessão e joga para o painel
            localStorage.setItem('user_session', JSON.stringify(data.session));
            window.location.href = 'dashboard.html';

        } catch (err) {
            // Erro: Desliga o loader para o usuário tentar de novo
            hideLoader();
            console.error("Erro de autenticação:", err.message);
            alert("Falha no login: E-mail ou senha incorretos.");
        }
    });
</script>
