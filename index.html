<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0c0c0e] text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#16161a] border border-zinc-800 rounded-2xl p-6 shadow-xl space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-[#d4af37]">Sistema Corp</h1>
            <p class="text-xs text-gray-400 mt-1">Autenticação Segura via Banco de Dados</p>
        </div>

        <form id="form-login" class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 block mb-1">E-mail de Acesso</label>
                <input type="email" id="login-email" placeholder="seu@email.com" class="w-full bg-[#0c0c0e] border border-zinc-700 rounded p-2.5 text-sm focus:border-[#d4af37] outline-none transition-colors" required />
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-1">Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-[#0c0c0e] border border-zinc-700 rounded p-2.5 text-sm focus:border-[#d4af37] outline-none transition-colors" required />
            </div>

            <button type="submit" class="w-full bg-[#d4af37] text-black hover:bg-[#b8860b] py-2.5 rounded-lg font-bold text-sm transition-colors mt-2 shadow-lg shadow-[#d4af37]/10">
                Entrar no Sistema
            </button>
        </form>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE (Substitua com as suas credenciais oficiais)
        const SUPABASE_URL = "https://hrdtylxfkcsgyhghhptr.supabase.co".replace(/\/$/, "");
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyZHR5bHhma2NzZ3loZ2hocHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODc3NzksImV4cCI6MjA5NTU2Mzc3OX0.DwnwVrOcYfTeiz18BJEvCipoeDUQ4t_dg3biuCtIe94";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Verificação preliminar: Se já existir sessão ativa armazenada no navegador, pula a tela de login
        if (localStorage.getItem('user_session')) {
            window.location.href = 'dashboard.html';
        }

        // Evento de submissão do formulário
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                // Invoca a stored function (RPC) que criamos diretamente no PostgreSQL do Supabase
                const { data, error } = await supabaseClient.rpc('fazer_login', {
                    p_email: email,
                    p_senha: password
                });

                if (error) throw error;

                const respostaBanco = data[0];

                if (respostaBanco && respostaBanco.sucesso) {
                    // Armazena com segurança os dados da sessão e o Token único gerado pelo banco
                    localStorage.setItem('user_session', JSON.stringify({
                        token: respostaBanco.session_token,
                        id: respostaBanco.usuario_id,
                        nome: respostaBanco.usuario_nome,
                        email: respostaBanco.usuario_email
                    }));
                    
                    // Avança para o painel principal
                    window.location.href = 'dashboard.html';
                } else {
                    // Mensagem devolvida pela validação interna do banco de dados
                    alert(respostaBanco ? respostaBanco.mensagem : "Erro de credenciais.");
                }
            } catch (err) {
                alert("Falha de comunicação com o servidor: " + err.message);
            }
        });
    </script>
</body>
</html>
