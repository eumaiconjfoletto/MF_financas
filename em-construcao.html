<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro 2110 - Página em Construção</title>
    <link rel="stylesheet" href="assets/css/style.css">
    
</head>

<body class="text-white min-h-screen flex items-center justify-center p-6">

    <div class="construction-wrap">

    <!-- FAIXA SUPERIOR -->
    <div class="construction-banner">
        🚧 SISTEMA EM CONSTRUÇÃO 🚧
    </div>

    <!-- ANIMAÇÃO CENTRAL -->
    <div class="construction-hero">

        <!-- COLUNA ESQUERDA -->
        <div class="tower">

            <div class="brick b1"></div>
            <div class="brick b2"></div>
            <div class="brick b3"></div>

        </div>

        <!-- CENTRO -->
        <div class="center">

            <div class="helmet">🪖</div>

            <div class="hammer">🔨</div>

            <h1>ERRO 2110</h1>
            <p>Página em construção ativa</p>

        </div>

        <!-- DIREITA -->
        <div class="tower reverse">

            <div class="brick b1"></div>
            <div class="brick b2"></div>
            <div class="brick b3"></div>

        </div>

    </div>

    <!-- PROGRESSO -->
    <div class="progress-box">

        <div class="progress-label">Construção do módulo</div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="progress-text">67% concluído</div>

    </div>

</div>
</body>
</html>
