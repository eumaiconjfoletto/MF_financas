<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contas Financeiras | MF Finanças</title>

    <link rel="stylesheet" href="assets/css/variaveis.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">
            <h1>MF <span>Finanças</span></h1>
        </div>

        <div class="sidebar-user">

            <div
                id="userName"
                class="sidebar-user-name">

                Usuário

            </div>

            <div class="sidebar-user-role">

                Administrador

            </div>

        </div>

        <nav class="sidebar-menu">

            <div class="menu-title">
                Principal
            </div>

            <a href="dashboard.html" class="menu-link">
                Dashboard
            </a>

            <div class="menu-title">
                Financeiro
            </div>

            <a href="lancamentos.html" class="menu-link">
                Lançamentos
            </a>

            <a href="contas.html" class="menu-link active">
                Contas Financeiras
            </a>

            <a href="categorias.html" class="menu-link">
                Categorias
            </a>

        </nav>

        <div class="sidebar-footer">

            <button
                class="btn btn-secondary btn-full"
                onclick="logout()">

                Sair

            </button>

        </div>

    </aside>

    <!-- CONTEÚDO -->

    <main class="main-content">

        <header class="topbar">

            <div class="topbar-title">

                <h2>
                    Contas Financeiras
                </h2>

                <span>
                    Bancos, caixas e carteiras
                </span>

            </div>

        </header>

        <div class="content">

            <!-- KPIS -->

            <div class="kpi-grid">

                <div class="kpi-card">

                    <div class="kpi-label">
                        Total de Contas
                    </div>

                    <div
                        id="kpiTotal"
                        class="kpi-value">

                        0

                    </div>

                </div>

                <div class="kpi-card">

                    <div class="kpi-label">
                        Contas Ativas
                    </div>

                    <div
                        id="kpiAtivas"
                        class="kpi-value">

                        0

                    </div>

                </div>

            </div>

            <!-- CRUD -->

            <div class="crud-layout">

                <!-- TABELA -->

                <div class="widget">

                    <div class="widget-title">

                        Contas Cadastradas

                    </div>

                    <div class="table-wrapper">

                        <table class="table">

                            <thead>

                                <tr>

                                    <th>Conta</th>
                                    <th>Saldo Inicial</th>
                                    <th>Status</th>
                                    <th>Ações</th>

                                </tr>

                            </thead>

                            <tbody id="listaContas">

                            </tbody>

                        </table>

                    </div>

                </div>

                <!-- FORMULÁRIO -->

                <div class="widget">

                    <div class="widget-title">

                        Nova Conta

                    </div>

                    <div class="form-group">

                        <label class="label">
                            Nome da Conta
                        </label>

                        <input
                            id="nome"
                            type="text"
                            class="input">

                    </div>

                    <div class="form-group">

                        <label class="label">
                            Saldo Inicial
                        </label>

                        <input
                            id="saldo"
                            type="number"
                            step="0.01"
                            value="0"
                            class="input">

                    </div>

                    <div class="form-group">

                        <label class="label">
                            Situação
                        </label>

                        <select
                            id="ativa"
                            class="select">

                            <option value="true">
                                Ativa
                            </option>

                            <option value="false">
                                Inativa
                            </option>

                        </select>

                    </div>

                    <button
                        onclick="salvarConta()"
                        class="btn btn-primary btn-full">

                        Salvar Conta

                    </button>

                </div>

            </div>

        </div>

    </main>

    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/contas.js"></script>

</body>

</html>
